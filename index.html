// WebGL Shader
let canvas, gl, program, startTime;

function initWebGL() {
    canvas = document.getElementById('pet-canvas');
    gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) return;

    const vs = `attribute vec4 aPosition; void main(){gl_Position = aPosition;}`;
    const fs = `
        precision mediump float;
        uniform float uTime;
        uniform vec2 uRes;
        void main() {
            vec2 uv = (gl_FragCoord.xy - uRes * 0.5) / min(uRes.x, uRes.y);
            float d = length(uv);
            float angle = atan(uv.y, uv.x);
            float wave = sin(uTime * 5.0 + d * 20.0 + angle * 8.0) * 0.5 + 0.5;
            vec3 color = mix(vec3(0.0, 0.95, 0.6), vec3(1.0, 0.7, 0.0), wave);
            float alpha = 1.0 - smoothstep(0.6, 1.0, d);
            gl_FragColor = vec4(color * (1.0 + wave * 0.8), alpha);
        }
    `;

    function createShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
    }

    program = gl.createProgram();
    gl.attachShader(program, createShader(gl.VERTEX_SHADER, vs));
    gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(program);
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

    const pos = gl.getAttribLocation(program, "aPosition");
    gl.enableVertexAttribArray(pos);
    gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

    const timeLoc = gl.getUniformLocation(program, "uTime");
    const resLoc = gl.getUniformLocation(program, "uRes");

    startTime = Date.now();

    function render() {
        const t = (Date.now() - startTime) / 1000;
        gl.uniform1f(timeLoc, t);
        gl.uniform2f(resLoc, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
    }
    render();
}
