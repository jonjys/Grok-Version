<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>KARMA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
    --bg: #000;
    --s2: #111118;
    --green: #00ff88;
    --pink: #ff3377;
    --gold: #ffcc00;
    --purple: #aa66ff;
    --teal: #00ddcc;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:#fff; height:100vh; overflow:hidden; }

#app { max-width:430px; margin:0 auto; height:100%; display:flex; flex-direction:column; position:relative; background:var(--bg); }

.topbar {
    position:absolute; top:0; left:0; right:0; height:calc(52px + var(--sat));
    padding-top:var(--sat); display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; background:rgba(0,0,0,0.95); z-index:200;
}
.logo { font-family:'Syne',sans-serif; font-size:26px; font-weight:900; letter-spacing:-1px; }

.main { flex:1; overflow:hidden; position:relative; padding-top:52px; }
.view { position:absolute; inset:0; display:none; flex-direction:column; overflow-y:auto; background:var(--bg); }
.view.active { display:flex; }

.card { background:var(--s2); margin:12px 16px; padding:16px; border-radius:18px; border:1px solid rgba(255,255,255,0.08); }

.bnav {
    display:flex; align-items:center; background:rgba(0,0,0,0.97); backdrop-filter:blur(32px);
    border-top:1px solid rgba(255,255,255,0.1); padding:8px 0 calc(8px + var(--sab)); z-index:200;
}
.nb {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:6px 0; cursor:pointer; color:#888;
}
.nb.on { color:var(--green); }
.nb .ni { font-size:28px; transition:all .2s; }
.nb.on .ni { transform:scale(1.2); }

.pet-container { width:240px; height:240px; margin:30px auto; position:relative; }
#pet-canvas { width:100%; height:100%; border-radius:50%; box-shadow:0 0 80px rgba(0,255,136,0.6); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// Full app logic
let G = { level:5, xp:1100, kc:186, petName:"Luna", flashes:[] };
let currentView = 0;
let map = null;

function loadData() {
    const saved = localStorage.getItem('karmaData');
    if (saved) Object.assign(G, JSON.parse(saved));
}

function saveData() {
    localStorage.setItem('karmaData', JSON.stringify(G));
}

function renderApp() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="topbar">
            <div class="logo">KARMA <span>🐾</span></div>
            <div>⚡ <span id="xp-val">${G.xp}</span> 💎 <span id="kc-val">${G.kc}</span></div>
        </div>

        <div class="main">
            <!-- Pet -->
            <div id="view-pet" class="view ${currentView === 0 ? 'active' : ''}">
                <div style="text-align:center;padding:40px 20px">
                    <h1>Level <span id="level-val">${G.level}</span></h1>
                    <div class="pet-container">
                        <canvas id="pet-canvas" width="240" height="240"></canvas>
                    </div>
                    <h2>${G.petName}</h2>
                    <p style="color:var(--green)">Mood: Legendary ✨</p>
                </div>
                <div style="display:flex;gap:15px;justify-content:center;padding:0 20px">
                    <button onclick="feedPet()" style="background:var(--green);color:#000;padding:16px 40px;border:none;border-radius:50px;font-weight:800">🍎 Mata</button>
                    <button onclick="playPet()" style="background:var(--purple);padding:16px 40px;border:none;border-radius:50px;font-weight:800">🎾 Lek</button>
                </div>
            </div>

            <!-- Flash -->
            <div id="view-flash" class="view ${currentView === 1 ? 'active' : ''}">
                <div style="padding:20px">
                    <h2 style="text-align:center">Flash Feed</h2>
                    <button onclick="postFlash()" style="width:100%;margin:20px 0;background:linear-gradient(var(--pink),var(--purple));padding:18px;border:none;border-radius:50px;color:white;font-weight:800">📹 Posta Flash</button>
                    <div id="flash-list"></div>
                </div>
            </div>

            <!-- Uppdrag -->
            <div id="view-uppdrag" class="view ${currentView === 2 ? 'active' : ''}">
                <div style="padding:20px">
                    <h2>Dagens Uppdrag</h2>
                    <div class="card" onclick="finishQuest(0)">Posta flash → +60 XP</div>
                    <div class="card" onclick="finishQuest(1)">Gå 8000 steg → +80 XP</div>
                    <div class="card" onclick="finishQuest(2)">IRL samtal → +50 XP</div>
                </div>
            </div>

            <!-- Karta -->
            <div id="view-map" class="view ${currentView === 3 ? 'active' : ''}">
                <div id="map" style="height:100%"></div>
                <div class="card">
                    <h3>Territorium</h3>
                    <div class="zone-grid" id="zone-grid"></div>
                </div>
            </div>
        </div>

        <div class="bnav">
            <div class="nb ${currentView===0?'on':''}" onclick="switchView(0)">🐾 Pet</div>
            <div class="nb ${currentView===1?'on':''}" onclick="switchView(1)">⚡ Flash</div>
            <div class="nb ${currentView===2?'on':''}" onclick="switchView(2)">🎯 Uppdrag</div>
            <div class="nb ${currentView===3?'on':''}" onclick="switchView(3)">🗺️ Karta</div>
        </div>
    `;

    if (currentView === 3) initMap();
    if (currentView === 1) renderFlashes();
    if (currentView === 0) initCanvasAnimation();
}

function switchView(n) {
    currentView = n;
    renderApp();
}

// Canvas Animation (enkelt exempel)
function initCanvasAnimation() {
    const canvas = document.getElementById('pet-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let angle = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(angle);
        ctx.font = '120px sans-serif';
        ctx.fillText('🐾', -60, 40);
        ctx.restore();
        angle += 0.02;
        requestAnimationFrame(draw);
    }
    draw();
}

// Leaflet med interaktion
function initMap() {
    const mapContainer = document.getElementById('map');
    if (!mapContainer) return;

    if (map) return;

    map = L.map('map').setView([59.3293, 18.0686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.marker([59.3293, 18.0686]).addTo(map)
        .bindPopup("KARMA HQ")
        .openPopup();

    const grid = document.getElementById('zone-grid');
    grid.innerHTML = '';
    const zones = ['🌲','🏙️','🏔️','🏖️','🌊','🏛️','🌉','🛤️','🏪','🌳'];
    for (let i = 0; i < 25; i++) {
        const z = document.createElement('div');
        z.className = 'zone';
        z.textContent = zones[i % zones.length];
        if (i % 3 === 0) z.classList.add('mine');
        z.onclick = () => alert('Territorium erövrat!');
        grid.appendChild(z);
    }
}

// Övriga funktioner
function petTap() { G.xp += 30; updateUI(); saveData(); }
function feedPet() { G.xp += 50; updateUI(); saveData(); }
function playPet() { G.xp += 40; G.kc += 15; updateUI(); saveData(); }

function postFlash() {
    const text = prompt("Vad visar din flash?", "Promenad i solnedgången 🌅");
    if (!text) return;
    G.flashes.unshift({text: text, time: "nu"});
    G.xp += 70;
    G.kc += 20;
    renderFlashes();
    updateUI();
    saveData();
}

function renderFlashes() {
    const container = document.getElementById('flash-list');
    if (!container) return;
    container.innerHTML = G.flashes.map(f => `<div class="card">${f.text} <small>(${f.time})</small></div>`).join('');
}

function finishQuest(i) {
    const xp = [60,80,50][i];
    G.xp += xp;
    updateUI();
    saveData();
    alert(`Uppdrag klart! +${xp} XP`);
}

function updateUI() {
    const xpEl = document.getElementById('xp-val');
    const kcEl = document.getElementById('kc-val');
    if (xpEl) xpEl.textContent = G.xp;
    if (kcEl) kcEl.textContent = G.kc;
}

window.onload = () => {
    loadData();
    renderApp();
    console.log("%cKARMA — Full version med Leaflet och Canvas klar", "color:#00ff88;font-weight:bold");
};
</script>
</body>
</html>
