<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>KARMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0a0a0f;
            --s2: #111118;
            --s3: #1a1a24;
            --green: #00ff88;
            --pink: #ff3377;
            --gold: #ffcc00;
            --purple: #aa66ff;
            --teal: #00ddcc;
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --ff-head: 'Syne', sans-serif;
            --ff-body: 'DM Sans', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; width:100%; overflow:hidden; background:var(--bg); color:#f2f2fa; font-family:var(--ff-body); }

        #app { max-width:430px; margin:0 auto; height:100%; display:flex; flex-direction:column; position:relative; background:var(--bg); }

        .topbar {
            position:absolute; top:0; left:0; right:0;
            height:calc(52px + var(--sat));
            padding-top:var(--sat);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 16px;
            background:linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            z-index:200;
        }
        .logo { font-family:var(--ff-head); font-size:24px; font-weight:900; letter-spacing:-1px; }
        .logo span { color:var(--green); }

        .main { flex:1; overflow:hidden; position:relative; padding-top:52px; }

        .view { position:absolute; inset:0; display:none; flex-direction:column; overflow-y:auto; background:var(--bg); }
        .view.active { display:flex; }

        /* Bottom Nav */
        .bnav {
            display:flex; align-items:center;
            background:rgba(0,0,0,0.97); backdrop-filter:blur(32px);
            border-top:1px solid rgba(255,255,255,0.08);
            padding:8px 0 calc(8px + var(--sab));
            z-index:200;
        }
        .nb {
            flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
            padding:6px 0; cursor:pointer; color:#888;
        }
        .nb.on { color:var(--green); }
        .nb .ni { font-size:26px; transition:all .2s; }
        .nb.on .ni { transform:scale(1.15); }
    </style>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="logo">KARMA <span>🐾</span></div>
            <div style="display:flex; gap:12px; font-size:18px; font-weight:700;">
                <span>⚡ <span id="xp-val">680</span></span>
                <span style="color:var(--gold)">💎 <span id="kc-val">42</span></span>
            </div>
        </div>

        <!-- Views -->
        <div class="main">
            <!-- PET -->
            <div id="view-pet" class="view active">
                <div style="text-align:center; padding:30px 20px;">
                    <h1 style="font-family:var(--ff-head); font-size:32px;">Level <span id="level-val">3</span></h1>
                    <div id="pet-emoji" onclick="petTap()" style="font-size:120px; margin:20px 0; cursor:pointer; transition:0.3s;">🐾</div>
                    <h2 id="pet-name" style="font-size:26px;">Luna</h2>
                    <p id="pet-mood" style="color:var(--green); font-weight:700;">Mood: Happy ✨</p>
                </div>

                <div style="padding:0 20px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                    <button onclick="feedPet()" style="background:var(--green); color:#000; padding:12px 24px; border:none; border-radius:999px; font-weight:800;">🍎 Mata</button>
                    <button onclick="playWithPet()" style="background:var(--purple); color:white; padding:12px 24px; border:none; border-radius:999px; font-weight:800;">🎾 Lek</button>
                </div>
            </div>

            <!-- FLASH -->
            <div id="view-flash" class="view">
                <div style="padding:30px 20px; text-align:center;">
                    <h2>Flash Feed</h2>
                    <button onclick="postFlash()" style="margin:30px 0; background:linear-gradient(135deg, var(--pink), var(--purple)); color:white; border:none; padding:16px 50px; border-radius:999px; font-size:17px; font-weight:800;">
                        📹 Posta Flash (1-5 sek)
                    </button>
                    <div id="flash-posts" style="text-align:left;"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <div class="bnav">
            <div class="nb on" onclick="switchView('view-pet')"><div class="ni">🐾</div><div class="nl">Pet</div></div>
            <div class="nb" onclick="switchView('view-flash')"><div class="ni">⚡</div><div class="nl">Flash</div></div>
            <div class="nb" onclick="alert('Uppdrag kommer i nästa uppdatering!')"><div class="ni">🎯</div><div class="nl">Uppdrag</div></div>
        </div>
    </div>

    <script>
        let G = {
            level: 3,
            xp: 680,
            kc: 42,
            petName: "Luna",
            mood: "happy",
            flashes: []
        };

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function petTap() {
            const emoji = document.getElementById('pet-emoji');
            emoji.style.transform = 'scale(1.35) rotate(12deg)';
            setTimeout(() => emoji.style.transform = '', 280);
            G.xp += 18;
            updateStats();
        }

        function feedPet() {
            G.xp += 35;
            G.mood = "happy";
            document.getElementById('pet-mood').textContent = "Mood: Very Happy 🍎";
            updateStats();
        }

        function playWithPet() {
            G.xp += 28;
            G.kc += 8;
            updateStats();
        }

        function postFlash() {
            const text = prompt("Vad händer i din flash? (kort beskrivning)", "Springer i parken 🏃");
            if (!text) return;
            
            G.flashes.unshift({ text, time: "nu" });
            G.xp += 55;
            G.kc += 12;
            
            renderFlashes();
            updateStats();
            alert("✅ Flash postad! +55 XP");
        }

        function renderFlashes() {
            const container = document.getElementById('flash-posts');
            container.innerHTML = G.flashes.map(f => `
                <div style="background:#111; padding:14px; margin:10px 0; border-radius:16px;">
                    <small>${f.time}</small><br>
                    ${f.text}
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('xp-val').textContent = G.xp;
            document.getElementById('kc-val').textContent = G.kc;
            document.getElementById('level-val').textContent = G.level;
        }

        // Init
        window.onload = () => {
            updateStats();
            renderFlashes();
            console.log("%cKARMA v2.1 – Fortsätter byggas stegvis", "color:#00ff88; font-weight:bold");
        };
    </script>
</body>
</html>
